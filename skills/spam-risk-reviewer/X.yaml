skill: spam-risk-reviewer
version: "0.1.0"
harness:
  cases:
    - name: low-risk-verified-sender
      inputs:
        campaign_draft:
          from: "admin@trusted.com"
          subject: "Newsletter"
          content_digest: "abcd"
        list_metadata:
          size: 1000
          bounce_rate: 0.01
          complaint_rate: 0.001
          freshness: 30
        sender_auth_posture:
          spf_pass: true
          dkim_pass: true
          dmarc_pass: true
          warm_up_days: 90
      caller:
        answers:
          agent_task.spam-risk-reviewer.output:
            send_risk_verdict:
              risk_level: "pass"
              preflight_clear: true
              blockers: []
              evidence_summary: "All good"
            needs_human: false
      expect:
        status: sealed

    - name: high-risk-incomplete-auth-poor-list
      inputs:
        campaign_draft:
          from: "admin@untrusted.com"
          subject: "Free Money"
          content_digest: "deadbeef"
        list_metadata:
          size: 50000
          bounce_rate: 0.15
          complaint_rate: 0.05
          freshness: 300
        sender_auth_posture:
          spf_pass: true
          dkim_pass: false
          dmarc_pass: true
          warm_up_days: 5
      caller:
        answers:
          agent_task.spam-risk-reviewer.output:
            send_risk_verdict:
              risk_level: "hold"
              preflight_clear: false
              blockers:
                - "DKIM fail"
                - "Bounce rate too high"
              evidence_summary: "High bounce rate and DKIM failure detected."
            needs_human: true
      expect:
        status: sealed

runners:
  spam-risk-reviewer:
    default: true
    type: agent-task
    agent: reviewer
    task: spam-risk-reviewer
    outputs:
      send_risk_verdict: object
      needs_human: boolean
    inputs:
      campaign_draft:
        type: object
        required: true
        description: "Draft info: from, subject, content_digest"
      list_metadata:
        type: object
        required: true
        description: "List info: size, bounce_rate, complaint_rate, freshness"
      sender_auth_posture:
        type: object
        required: true
        description: "Auth posture: spf_pass, dkim_pass, dmarc_pass, warm_up_days"
